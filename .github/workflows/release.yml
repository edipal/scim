name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions: {}

jobs:
  release:
    name: Bump version, tag and release
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set Maven version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Update Kubernetes image tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -Ei "s|(image: edipal/scim-server-api:).*|\\1${VERSION}|" k8s/app/scim-server-api/deployment.yaml
          sed -Ei "s|(image: edipal/scim-server-mgmt:).*|\\1${VERSION}|" k8s/app/scim-server-mgmt/deployment.yaml
          sed -Ei "s|(image: edipal/scim-validator-mgmt:).*|\\1${VERSION}|" k8s/app/scim-validator-mgmt/deployment.yaml

      - name: Commit version changes
        run: |
          git add $(find . -name "pom.xml" -not -path "*/target/*")
          git add \
            k8s/app/scim-server-api/deployment.yaml \
            k8s/app/scim-server-mgmt/deployment.yaml \
            k8s/app/scim-validator-mgmt/deployment.yaml
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
