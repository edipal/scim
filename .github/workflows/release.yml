name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions: {}

jobs:
  release:
    name: Bump version, tag and release
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.5.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) NEW_VERSION="$((MAJOR+1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set Maven version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Commit version changes
        run: |
          git add $(find . -name "pom.xml" -not -path "*/target/*")
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
