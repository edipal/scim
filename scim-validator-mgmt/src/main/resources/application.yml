spring:
  application:
    name: scim-validator-mgmt
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}
            scope: ${AZURE_SCOPES}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Azure
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0

server:
  servlet:
    session:
      cookie:
        name: SCIM_VALIDATOR_MGMT_SESSION

management:
  endpoint:
    health:
      show-components: always
  endpoints:
    web:
      exposure:
        include: health
  health:
    ping:
      enabled: false
    ssl:
      enabled: false
    diskspace:
      enabled: false

logging:
  level:
    "[com.scimplayground]": DEBUG
    "[org.springframework.security]": DEBUG
    "[org.springframework.security.web.csrf]": TRACE
    "[org.springframework.security.web.FilterChainProxy]": DEBUG
