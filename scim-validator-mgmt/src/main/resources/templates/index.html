<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIM Validator</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" href="/favicon.svg">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f6f8; color: #202124; }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .site-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 14px; border-bottom: 1px solid #d8dbe1; margin-bottom: 20px; gap: 12px; }
        .site-header-brand h1 { margin: 0; font-size: 1.2rem; }
        .site-header-user { display: flex; align-items: center; gap: 10px; }
        .user-name { font-size: 13px; color: #4b5563; }
        .logout-form { margin: 0; }
        .logout-button { margin-top: 0; padding: 8px 14px; background: #374151; color: #fff; font-size: 13px; }
        .card { background: #fff; border: 1px solid #d8dbe1; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        h1, h2 { margin: 0 0 12px; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; font-weight: 600; }
        input { padding: 8px; border: 1px solid #bfc5d0; border-radius: 6px; font-size: 14px; }
        button { margin-top: 8px; padding: 10px 14px; border: none; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
        .inline-form { margin: 0; }
        .danger-button { margin-top: 0; padding: 6px 10px; background: #dc2626; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #e6e8ee; padding: 10px; text-align: left; vertical-align: top; }
        .status-success { color: #166534; font-weight: 700; }
        .status-failed, .status-error { color: #b91c1c; font-weight: 700; }
        .error { color: #b91c1c; font-size: 12px; }
        a { color: #1d4ed8; text-decoration: none; }
        #run-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #run-overlay.active { display: flex; }
        .run-dialog {
            background: #fff;
            border-radius: 10px;
            padding: 36px 48px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .run-spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #e5e7eb;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .run-dialog p { font-size: 15px; font-weight: 600; color: #202124; margin: 0; }
        .run-dialog small { font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
<div class="container">
    <header class="site-header">
        <div class="site-header-brand">
            <h1>SCIM Validator</h1>
        </div>
        <div class="site-header-user">
            <span class="user-name" th:text="${currentUser}">User</span>
            <form method="post" th:action="@{/logout}" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="logout-button">Logout</button>
            </form>
        </div>
    </header>
    <div class="card">
        <form method="post" th:action="@{/runs}" th:object="${runForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="grid">
                <div class="field">
                    <label for="name">Run Name</label>
                    <input id="name" type="text" th:field="*{name}" placeholder="e.g. Okta nightly validation">
                    <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="field">
                    <label for="baseUrl">SCIM Base URL</label>
                    <input id="baseUrl" type="text" th:field="*{baseUrl}" placeholder="https://host/scim/v2">
                    <div class="error" th:if="${#fields.hasErrors('baseUrl')}" th:errors="*{baseUrl}"></div>
                </div>
            </div>
            <div class="field">
                <label for="authToken">Bearer Token</label>
                <input id="authToken" type="password" th:field="*{authToken}" placeholder="token">
                <div class="error" th:if="${#fields.hasErrors('authToken')}" th:errors="*{authToken}"></div>
            </div>
            <button type="submit" id="run-btn">Run Validation Suite</button>
        </form>
    </div>

    <div id="run-overlay">
        <div class="run-dialog">
            <div class="run-spinner"></div>
            <p>Running tests&hellip;</p>
            <small>This may take a minute. Please wait.</small>
        </div>
    </div>

    <div class="card">
        <h2>Validation Runs</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Owner</th>
                <th>URL</th>
                <th>Date</th>
                <th>Status</th>
                <th>Result</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(runs)}">
                <td colspan="8">No runs yet.</td>
            </tr>
            <tr th:each="run : ${runs}">
                <td><a th:href="@{/runs/{id}(id=${run.id})}" th:text="${run.id}">id</a></td>
                <td th:text="${run.name}">name</td>
                <td th:text="${run.createdByUsername}">owner</td>
                <td th:text="${run.targetUrl}">url</td>
                <td th:text="${#temporals.format(run.executedAt, 'yyyy-MM-dd HH:mm:ssXXX')}">date</td>
                <td th:text="${run.status}" th:classappend="${'status-' + #strings.toLowerCase(run.status)}">status</td>
                <td th:text="${run.passedTests + ' / ' + run.totalTests}">result</td>
                <td>
                    <form class="inline-form" method="post" th:action="@{/runs/{id}/delete(id=${run.id})}" onsubmit="return confirm('Delete this run and all its recorded test results?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="danger-button">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    (function () {
        var form = document.querySelector('.card form');
        var overlay = document.getElementById('run-overlay');
        if (form && overlay) {
            form.addEventListener('submit', function (e) {
                // Basic client-side validation: only show overlay if required fields are filled
                var name = form.querySelector('#name');
                var baseUrl = form.querySelector('#baseUrl');
                var token = form.querySelector('#authToken');
                if (name && name.value.trim() && baseUrl && baseUrl.value.trim() && token && token.value.trim()) {
                    overlay.classList.add('active');
                }
            });
        }
    })();
</script>
</body>
</html>
