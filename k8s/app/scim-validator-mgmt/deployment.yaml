apiVersion: apps/v1
kind: Deployment
metadata:
  name: scim-validator-mgmt
  labels:
    app.kubernetes.io/name: scim-validator-mgmt
    app.kubernetes.io/component: validator-mgmt
spec:
  replicas: 2
  minReadySeconds: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: scim-validator-mgmt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scim-validator-mgmt
        app.kubernetes.io/component: validator-mgmt
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: scim-validator-mgmt
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: scim-validator-mgmt
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-postgres
          image: ghcr.io/cloudnative-pg/postgresql:18.1-standard-trixie
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - until pg_isready -h scim-postgres-rw -p 5432 -d scimvalidation; do echo waiting for postgres; sleep 2; done
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: scim-validator-mgmt
          image: edipal/scim-validator-mgmt:1.0.8
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: scim-validator-mgmt-k3s-config
            - secretRef:
                name: scim-validator-mgmt-k3s-secrets
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: scim-postgres-validator
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scim-postgres-validator
                  key: password
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 750m
              ephemeral-storage: 256Mi
              memory: 1536Mi
            limits:
              cpu: 750m
              ephemeral-storage: 1Gi
              memory: 1536Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL