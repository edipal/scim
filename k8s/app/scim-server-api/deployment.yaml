apiVersion: apps/v1
kind: Deployment
metadata:
  name: scim-server-api
  labels:
    app.kubernetes.io/name: scim-server-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scim-server-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scim-server-api
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      containers:
        - name: scim-server-api
          image: edipal/scim-server-api:1.0.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: scim-server-api-k3s-config
            - secretRef:
                name: scim-server-api-k3s-secrets
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scim-postgres-playground
                  key: password
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              ephemeral-storage: 256Mi
              memory: 512Mi
            limits:
              cpu: "1"
              ephemeral-storage: 1Gi
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL