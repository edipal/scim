server:
  servlet:
    session:
      cookie:
        name: SCIM_SERVER_MGMT_SESSION

spring:
  application:
    name: scim-server-mgmt
  flyway:
    locations:
      - classpath:db/migration
      - classpath:db/common
  profiles:
    default: azure
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}
            scope: ${AZURE_SCOPES}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Azure
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0

logging:
  level:
    "[com.scimplayground]": DEBUG
    "[org.springframework.security]": DEBUG
    "[org.springframework.security.web.csrf]": TRACE
    "[org.springframework.security.web.FilterChainProxy]": DEBUG

management:
  endpoint:
    health:
      show-components: always
  endpoints:
    web:
      exposure:
        include: health
  health:
    ping:
      enabled: false
    ssl:
      enabled: false
    diskspace:
      enabled: false


app:
  security:
    actuator:
      api-key: ${ACTUATOR_API_KEY}
    azure:
      role-claim: ${APP_SECURITY_AZURE_ROLE_CLAIM:roles}
    oidc:
      admin-role: ${APP_SECURITY_OIDC_ADMIN_ROLE:admin}
      user-role: ${APP_SECURITY_OIDC_USER_ROLE:user}
    cloudflare:
      role-claim: ${APP_SECURITY_CLOUDFLARE_ROLE_CLAIM:roles}
      issuer-uri: ${CLOUDFLARE_ACCESS_ISSUER_URI}
      audience: ${CLOUDFLARE_ACCESS_AUDIENCE}
      jwk-set-uri: ${CLOUDFLARE_ACCESS_JWK_SET_URI:}
      logout-url: ${CLOUDFLARE_ACCESS_LOGOUT_URL:/}
      token-header: ${CLOUDFLARE_ACCESS_TOKEN_HEADER:Cf-Access-Jwt-Assertion}

  scim-api:
    base:
      url: ${APP_SCIM_API_BASE_URL:http://localhost:8080}